spring.application.name=iconverter

# Framework cap = the largest per-endpoint limit (audio/video = 50 MB). Other
# controllers enforce their own stricter 25 MB check and return 400 themselves.
# Oversized uploads beyond this cap are rejected by the framework
# (MaxUploadSizeExceededException → 400).
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

app.temp-dir=/tmp/iconverter

# Per-IP rate limit on /api/** (requests per minute). Conversions are heavy
# external processes, so cap each client to protect CPU/memory.
app.rate-limit.per-minute=60

logging.level.root=INFO
logging.level.com.yourpackage=DEBUG
logging.level.org.springframework.web=DEBUG

logging.file.name=application.log
logging.file.path=./logs

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
