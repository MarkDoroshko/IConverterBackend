spring.application.name=iconverter

# 25 MB per file matches the controller checks and the UI promise. The request
# cap is a bit higher to allow multipart overhead. Oversized uploads are
# rejected by the framework (MaxUploadSizeExceededException → 400).
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

app.temp-dir=/tmp/iconverter

logging.level.root=INFO
logging.level.com.yourpackage=DEBUG
logging.level.org.springframework.web=DEBUG

logging.file.name=application.log
logging.file.path=./logs

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
